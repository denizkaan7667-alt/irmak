
<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>IRMAK 😼</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: Arial, sans-serif;
      background-color: #ffe6f2;
      user-select: none;
      /* Mobilde kaydırma yapabilmek için overflow: hidden'ı kaldırdık */
      min-height: 100vh;
    }

    .wrapper {
      display: flex;
      flex-direction: row; /* Masaüstünde yan yana */
      padding: 20px;
      gap: 20px;
    }

    /* --- MÜZİK KUTUSU --- */
    .music-box {
      width: 280px;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding-top: 20px;
    }

    .music-box iframe {
      width: 100%;
      height: 450px;
      border-radius: 12px;
      box-shadow: 0px 4px 10px rgba(0,0,0,0.1);
    }

    /* --- İÇERİK --- */
    .content {
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    h1 {
      text-align: center;
      color: #d63384;
      font-size: 26px;
      margin-bottom: 20px;
    }

    .gallery {
      display: grid;
      /* Masaüstünde 3 sütun, mobilde değişecek */
      grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
      gap: 15px;
      padding-bottom: 50px;
    }

    .gallery img {
      width: 100%; /* Sabit px yerine %100 yaptık */
      aspect-ratio: 1 / 1;
      object-fit: cover;
      border-radius: 12px;
      box-shadow: 0px 4px 8px rgba(0, 0, 0, 0.2);
      transition: transform 0.3s;
    }

    .gallery img:hover {
      transform: scale(1.02);
    }

    footer {
      text-align: center;
      padding: 20px;
      font-size: 18px;
      color: #d63384;
      font-weight: bold;
    }

    /* --- KALP EFEKTİ --- */
    .heart {
      position: absolute;
      color: red;
      font-size: 18px;
      font-weight: bold;
      pointer-events: none;
      white-space: nowrap;
      animation: floatUp 1s ease-out forwards;
      z-index: 9999;
    }

    @keyframes floatUp {
      0% { opacity: 1; transform: translateY(0) scale(1); }
      100% { opacity: 0; transform: translateY(-50px) scale(1.5); }
    }

    /* --- MOBİL UYUMLULUK AYARLARI (Medya Sorgusu) --- */
    @media (max-width: 768px) {
      .wrapper {
        flex-direction: column; /* Mobilde her şey alt alta */
        padding: 10px;
      }

      .music-box {
        width: 100%; /* Müzik kutusu tüm ekranı kaplasın */
        padding-top: 0;
      }

      .music-box iframe {
        height: 152px; /* Mobilde müzik kutusu çok yer kaplamasın diye küçülttük */
      }

      .content {
        padding-left: 0;
      }

      .gallery {
        grid-template-columns: repeat(2, 1fr); /* Mobilde yan yana 2 fotoğraf olsun */
        gap: 10px;
      }

      h1 {
        font-size: 20px;
        margin-top: 10px;
      }
    }
  </style>
</head>
<body>
  <div class="wrapper">
    <div class="music-box">
      <iframe src="https://open.spotify.com/embed/track/6UUE9Yxid81E8v9jH4UvFz?utm_source=generator" frameborder="0" allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture" loading="lazy"></iframe>
    </div>

    <div class="content">
      <h1> IRMAKKKK 💞</h1>
      <div class="gallery">
        <img src="images/irmak1.jfif" alt="Fotoğraf 1">
        <img src="images/irmak2.jfif" alt="Fotoğraf 2">
        <img src="images/irmak3.jfif" alt="Fotoğraf 3">
        <img src="images/irmak4.jfif" alt="Fotoğraf 4">
        <img src="images/irmak5.jfif" alt="Fotoğraf 5">
        <img src="images/irmak6.jfif" alt="Fotoğraf 6">
        <img src="images/irmak7.jfif" alt="Fotoğraf 7">
      </div>
      <footer> irmak </footer>
    </div>
  </div>

  <script>
    // Kalp efekti dokunmatik ekranlarda da çalışsın diye "touchstart" ekledik
    function createHeart(x, y) {
      const heart = document.createElement("div");
      heart.classList.add("heart");
      heart.innerHTML = "❤️ IRMAK";
      heart.style.left = `${x}px`;
      heart.style.top = `${y}px`;
      document.body.appendChild(heart);

      setTimeout(() => heart.remove(), 1000);
    }

    document.addEventListener("mousedown", (e) => {
      createHeart(e.clientX, e.clientY);
    });

    // Mobil dokunma desteği
    document.addEventListener("touchstart", (e) => {
      const touch = e.touches[0];
      createHeart(touch.clientX, touch.clientY);
    });
  </script>
</body>
</html>
